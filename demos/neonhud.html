<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NeonHUD — Live Crypto Markets</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
<style>
  :root{
    --bg:#06060F; --panel:#0E0E1E; --border:rgba(255,46,136,.2);
    --pink:#FF2E88; --cyan:#00E5FF; --green:#3DFF9E; --red:#FF4D6A;
    --text:#EDEDF7; --muted:#8B93A7;
  }
  *{box-sizing:border-box; margin:0;}
  body{background:var(--bg); color:var(--text); font-family:'Space Grotesk',sans-serif; min-height:100vh; padding:24px;}
  .mono{font-family:'JetBrains Mono',monospace;}
  .grid{display:grid; gap:18px; max-width:1200px; margin:0 auto;}
  header.grid{grid-template-columns:1fr auto; align-items:center;}
  .cards{grid-template-columns:repeat(auto-fit,minmax(210px,1fr));}
  .main{grid-template-columns:2fr 1fr;}
  @media(max-width:900px){.main{grid-template-columns:1fr;}}
  .panel{background:var(--panel); border:1px solid rgba(255,255,255,.07); border-radius:16px; padding:20px;}
  .panel:hover{border-color:rgba(255,46,136,.35);}
  h1{font-family:'JetBrains Mono'; font-size:20px; letter-spacing:.14em;}
  h1 b{color:var(--cyan);} h1 i{color:var(--pink); font-style:normal;}
  .sub{color:var(--muted); font-size:13px; margin-top:3px;}
  .badge{display:inline-flex; align-items:center; gap:8px; border:1px solid rgba(61,255,158,.4); color:var(--green); font-family:'JetBrains Mono'; font-size:11px; padding:6px 14px; border-radius:999px;}
  .badge.sim{border-color:rgba(255,180,60,.5); color:#FFB43C;}
  .pulse{width:8px;height:8px;border-radius:50%;background:currentColor; animation:pulse 1.6s infinite;}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.25}}
  .lbl{color:var(--muted); font-family:'JetBrains Mono'; font-size:11px; letter-spacing:.1em; text-transform:uppercase;}
  .coin-head{display:flex; align-items:center; justify-content:space-between; margin-bottom:8px;}
  .sym{font-family:'JetBrains Mono'; font-weight:700; font-size:13px;}
  .price{font-size:24px; font-weight:700; margin:2px 0; text-shadow:0 0 16px rgba(0,229,255,.25);}
  .chg{font-family:'JetBrains Mono'; font-size:12px;}
  .up{color:var(--green);} .down{color:var(--red);}
  table{width:100%; border-collapse:collapse; font-size:13.5px;}
  th{color:var(--muted); font-family:'JetBrains Mono'; font-weight:500; text-align:left; font-size:10.5px; text-transform:uppercase; letter-spacing:.08em; padding:8px 6px; border-bottom:1px solid rgba(255,255,255,.08);}
  td{padding:11px 6px; border-bottom:1px solid rgba(255,255,255,.04);}
  td.r,th.r{text-align:right; font-family:'JetBrains Mono';}
  .cname{font-weight:600;} .cname span{color:var(--muted); font-family:'JetBrains Mono'; font-size:11px; margin-left:6px;}
  canvas{max-height:280px;}
  footer{max-width:1200px; margin:18px auto 0; color:var(--muted); font-family:'JetBrains Mono'; font-size:11px; text-align:center;}
  footer a{color:var(--cyan); text-decoration:none;}
</style>
</head>
<body>
<div class="grid">

  <header class="grid panel">
    <div>
      <h1>NEON<b>HUD</b> <i>· MARKETS</i></h1>
      <p class="sub">Live cryptocurrency dashboard — real market data, zero backend</p>
    </div>
    <span class="badge" id="badge"><span class="pulse"></span> <span id="badge-txt">CONNECTING…</span></span>
  </header>

  <section class="grid cards" id="cards"></section>

  <section class="grid main">
    <div class="panel">
      <p class="lbl" style="margin-bottom:12px">Bitcoin — last 24h (USD)</p>
      <canvas id="chart"></canvas>
    </div>
    <div class="panel">
      <p class="lbl" style="margin-bottom:12px">Market Overview</p>
      <table>
        <thead><tr><th>Asset</th><th class="r">Price</th><th class="r">24h</th></tr></thead>
        <tbody id="tbl"></tbody>
      </table>
    </div>
  </section>

</div>
<footer>NeonHUD · built by <a href="../index.html">Vadim Melnic</a> · data: CoinGecko public API · refreshes every 60s</footer>

<script>
  const COINS = ['bitcoin','ethereum','solana','litecoin','the-open-network','dogecoin'];
  const SYM = {bitcoin:'BTC', ethereum:'ETH', solana:'SOL', litecoin:'LTC', 'the-open-network':'TON', dogecoin:'DOGE'};
  const fmt$ = n => '$' + n.toLocaleString('en-US',{minimumFractionDigits: n<10?4:2, maximumFractionDigits: n<10?4:2});
  const fmtC = n => (n>=0?'▲ +':'▼ ') + Math.abs(n).toFixed(2) + '%';

  let chart;
  function drawChart(points, simulated){
    const ctx = document.getElementById('chart');
    const grad = ctx.getContext('2d').createLinearGradient(0,0,0,280);
    grad.addColorStop(0,'rgba(255,46,136,.4)'); grad.addColorStop(1,'rgba(255,46,136,0)');
    if (chart) chart.destroy();
    chart = new Chart(ctx,{type:'line',
      data:{labels: points.map(p=>p[0]), datasets:[{data: points.map(p=>p[1]), fill:true,
        backgroundColor:grad, borderColor:'#00E5FF', borderWidth:2, pointRadius:0, tension:.3}]},
      options:{plugins:{legend:{display:false}},
        scales:{x:{grid:{color:'rgba(255,255,255,.04)'},ticks:{color:'#8B93A7',maxTicksLimit:8}},
                y:{grid:{color:'rgba(255,255,255,.06)'},ticks:{color:'#8B93A7',callback:v=>'$'+(v/1000).toFixed(1)+'k'}}},
        animation:{duration:500}}});
  }

  function render(markets){
    document.getElementById('cards').innerHTML = markets.slice(0,4).map(m => `
      <div class="panel">
        <div class="coin-head"><span class="sym">${SYM[m.id]||m.symbol.toUpperCase()}</span><span class="lbl">${m.name}</span></div>
        <p class="price">${fmt$(m.current_price)}</p>
        <p class="chg ${m.price_change_percentage_24h>=0?'up':'down'}">${fmtC(m.price_change_percentage_24h||0)}</p>
      </div>`).join('');
    document.getElementById('tbl').innerHTML = markets.map(m => `
      <tr>
        <td class="cname">${SYM[m.id]||m.symbol.toUpperCase()}<span>${m.name}</span></td>
        <td class="r">${fmt$(m.current_price)}</td>
        <td class="r ${m.price_change_percentage_24h>=0?'up':'down'}">${(m.price_change_percentage_24h||0).toFixed(2)}%</td>
      </tr>`).join('');
  }

  function setBadge(live){
    const b = document.getElementById('badge'), t = document.getElementById('badge-txt');
    if(live){ b.classList.remove('sim'); t.textContent = 'LIVE MARKET DATA'; }
    else { b.classList.add('sim'); t.textContent = 'SIM MODE — API UNREACHABLE'; }
  }

  // simulated fallback so the demo always works (offline, rate-limited, etc.)
  function simulate(){
    const base = {bitcoin:[109420,'Bitcoin'], ethereum:[3890,'Ethereum'], solana:[228,'Solana'],
                  litecoin:[106,'Litecoin'], 'the-open-network':[7.4,'Toncoin'], dogecoin:[0.31,'Dogecoin']};
    const markets = COINS.map(id => ({id, name:base[id][1], symbol:SYM[id],
      current_price: base[id][0]*(1+(Math.random()-.5)*.02),
      price_change_percentage_24h: (Math.random()-.45)*6}));
    render(markets); setBadge(false);
    const now = Date.now(); let v = base.bitcoin[0];
    const pts = [...Array(96)].map((_,i)=>{ v *= 1+(Math.random()-.5)*.004;
      return [new Date(now-(95-i)*15*60000).getHours()+':00', v]; });
    drawChart(pts, true);
  }

  async function load(){
    try{
      const [mkRes, chRes] = await Promise.all([
        fetch('https://api.coingecko.com/api/v3/coins/markets?vs_currency=usd&ids='+COINS.join(',')+'&price_change_percentage=24h'),
        fetch('https://api.coingecko.com/api/v3/coins/bitcoin/market_chart?vs_currency=usd&days=1')
      ]);
      if(!mkRes.ok || !chRes.ok) throw new Error('api');
      const markets = await mkRes.json();
      const chartData = await chRes.json();
      markets.sort((a,b)=>COINS.indexOf(a.id)-COINS.indexOf(b.id));
      render(markets); setBadge(true);
      drawChart(chartData.prices.filter((_,i)=>i%3===0).map(p=>{
        const d = new Date(p[0]); return [d.getHours()+':'+String(d.getMinutes()).padStart(2,'0'), p[1]];
      }), false);
    }catch(e){ simulate(); }
  }

  load();
  setInterval(load, 60000);
</script>
</body>
</html>
